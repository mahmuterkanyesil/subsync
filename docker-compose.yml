services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  agent:
    image: ghcr.io/mahmuterkanyesil/subsync:latest
    restart: unless-stopped
    command: ./bin/agent
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STATE_DB_PATH=/data/state.db
      - PROGRESS_DIR=/data/progress
      - WATCH_DIRS=${WATCH_DIRS:-/tv:/movies}
      - SCAN_INTERVAL_SEC=30
      - LOG_FORWARD_URL=http://api:8080/api/internal/logs
      - LOG_LEVEL=debug
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${TV_DIR:-/home/mahmuterkanyesil/tv}:/tv:ro
      - ${MOVIES_DIR:-/home/mahmuterkanyesil/movies}:/movies:ro
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep /app/bin/agent | grep -v grep || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ghcr.io/mahmuterkanyesil/subsync:latest
    restart: unless-stopped
    command: ./bin/worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STATE_DB_PATH=/data/state.db
      - PROGRESS_DIR=/data/progress
      - BATCH_SIZE=500
      - WORKER_CONCURRENCY=2
      - LOG_FORWARD_URL=http://api:8080/api/internal/logs
      - LOG_LEVEL=debug
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${TV_DIR:-/home/mahmuterkanyesil/tv}:/tv:ro
      - ${MOVIES_DIR:-/home/mahmuterkanyesil/movies}:/movies:ro
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep /app/bin/worker | grep -v grep || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  embedder:
    image: ghcr.io/mahmuterkanyesil/subsync:latest
    restart: unless-stopped
    command: ./bin/embedder
    environment:
      - STATE_DB_PATH=/data/state.db
      - EMBED_INTERVAL_SEC=600
      - LOG_FORWARD_URL=http://api:8080/api/internal/logs
      - LOG_LEVEL=debug
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${TV_DIR:-/home/mahmuterkanyesil/tv}:/tv
      - ${MOVIES_DIR:-/home/mahmuterkanyesil/movies}:/movies
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep /app/bin/embedder | grep -v grep || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    image: ghcr.io/mahmuterkanyesil/subsync:latest
    restart: unless-stopped
    command: ./bin/api
    environment:
      - STATE_DB_PATH=/data/state.db
      - PROGRESS_DIR=/data/progress
      - REDIS_URL=redis://redis:6379/0
      - API_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "8080:8080"
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
