name: CI - tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25
      - name: Run unit tests
        run: go test ./... -v

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    services: {}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry (for compose/pull)
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST != '' && secrets.REGISTRY_HOST || 'docker.io' }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Prepare data dirs
        run: |
          mkdir -p $GITHUB_WORKSPACE/data
          mkdir -p $GITHUB_WORKSPACE/tv
          mkdir -p $GITHUB_WORKSPACE/movies
          echo "DATA_DIR=$GITHUB_WORKSPACE/data" >> $GITHUB_ENV
          echo "TV_DIR=$GITHUB_WORKSPACE/tv" >> $GITHUB_ENV
          echo "MOVIES_DIR=$GITHUB_WORKSPACE/movies" >> $GITHUB_ENV
      - name: Start compose
        run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8080/health >/dev/null 2>&1; then
              echo "api healthy"; break
            fi
            sleep 2
          done
      - name: Run smoke script
        run: bash tests/e2e/run-smoke.sh
      - name: Tear down
        if: always()
        run: docker compose down -v
